<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 60px 80px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      max-width: 500px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }

    p {
      font-size: 1.1rem;
      color: #666;
      line-height: 1.6;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      margin: 24px auto 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, World!</h1>
    <p>Welcome! This is the beginning of something great.<br>Glad you're here.</p>
    <div class="dot"></div>
  </div>
</body>
</html>
